apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: movie-service
  template:
    metadata:
      labels:
        app: movie-service
    spec:
      containers:
        - name: movie-service
          image: "{{ .Values.movieService.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn"]
          args:
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "{{ .Values.movieService.port }}"
            - --loop
            - asyncio
          ports:
            - containerPort: {{ .Values.movieService.port }}
          env:
            - name: DATABASE_URI
              value: {{ .Values.movieService.databaseUri | quote }}
            - name: CAST_SERVICE_HOST_URL
              value: {{ .Values.movieService.castServiceUrl | quote }}