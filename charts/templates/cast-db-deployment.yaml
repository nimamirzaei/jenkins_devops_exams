apiVersion: apps/v1
kind: Deployment
metadata:
  name: cast-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cast-db
  template:
    metadata:
      labels:
        app: cast-db
    spec:
      containers:
        - name: cast-db
          image: {{ .Values.castDb.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.castDb.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.castDb.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.castDb.database | quote }}
          volumeMounts:
            - name: cast-db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: cast-db-storage
          persistentVolumeClaim:
            claimName: cast-db-pvc